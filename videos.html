<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --surface2: #151515;
    --border: #1f1f1f; --border2: #2a2a2a;
    --text: #f0f0f0; --muted: #555; --muted2: #333;
  }
  body { font-family: 'Archivo Narrow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 56px;
    background: rgba(8,8,8,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: #fff; text-decoration: none; }
  .logo span { color: var(--muted); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: #fff; }
  .nav-icons { display: flex; align-items: center; gap: 10px; }

  .hero { padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); }
  .hero p { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 7vw, 72px); letter-spacing: 0.04em; line-height: 0.9; color: #fff; }

  .section { padding: 2.5rem 2rem 0; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem; padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border2);
  }
  .section-title {
    display: flex; align-items: center; gap: 10px;
  }
  .section-title h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.06em; color: #fff;
  }
  .platform-icon { display: flex; align-items: center; }
  .subscribe-btn {
    font-family: 'Archivo Narrow', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 14px;
    text-decoration: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .subscribe-btn:hover { border-color: #fff; color: #fff; }
  .subscribe-btn.yt { border-color: rgba(255,0,0,0.4); color: #ff4444; }
  .subscribe-btn.yt:hover { border-color: #ff0000; color: #ff0000; }
  .subscribe-btn.tt { border-color: rgba(105,201,208,0.4); color: #69c9d0; }
  .subscribe-btn.tt:hover { border-color: #69c9d0; color: #69c9d0; }

  .scroll-row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 1.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    flex-direction: row-reverse;
  }
  .scroll-row::-webkit-scrollbar { height: 4px; }
  .scroll-row::-webkit-scrollbar-track { background: transparent; }
  .scroll-row::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .video-card {
    flex-shrink: 0;
    width: 240px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: opacity 0.2s;
  }
  .video-card:hover { opacity: 0.8; }
  .video-card.short { width: 145px; }

  .thumb-wrap {
    position: relative;
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .video-card .thumb-wrap { aspect-ratio: 16/9; }
  .video-card.short .thumb-wrap { aspect-ratio: 9/16; }
  .video-card.tiktok .thumb-wrap { aspect-ratio: 9/16; }

  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-play {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.25);
    opacity: 0; transition: opacity 0.2s;
  }
  .video-card:hover .thumb-play { opacity: 1; }
  .thumb-play svg { width: 36px; height: 36px; }

  .video-date {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted2); margin-bottom: 4px;
  }
  .video-title {
    font-size: 13px; font-weight: 500; color: #ccc;
    line-height: 1.35; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .section-spacer { height: 2.5rem; }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem; margin-top: 3rem;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  footer p { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: #fff; }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .section { padding: 2rem 1rem 0; }
    .nav-links { display: none; }
    .video-card { width: 200px; }
    .video-card.short, .video-card.tiktok { width: 130px; }
  }
</style>
