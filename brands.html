<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --surface2: #151515;
    --border: #1f1f1f; --border2: #2a2a2a;
    --text: #f0f0f0; --muted: #555; --muted2: #333;
    --nav-bg: rgba(8,8,8,0.95);
  }
  :root.light {
    --bg: #f5f5f3; --surface: #fff; --surface2: #f0f0ee;
    --border: #e0e0de; --border2: #d0d0ce;
    --text: #111; --muted: #888; --muted2: #bbb;
    --nav-bg: rgba(245,245,243,0.95);
  }
  body { font-family: 'Archivo Narrow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; scrollbar-gutter: stable; }
  html { overflow-y: scroll; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 56px;
    background: var(--nav-bg); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--text); text-decoration: none; }
  .logo span { color: var(--muted); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .theme-toggle {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--muted); color: var(--text); }

  .hero { padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); }
  .hero p { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 7vw, 72px); letter-spacing: 0.04em; line-height: 0.9; color: var(--text); }

  .search-bar { padding: 1rem 2rem; border-bottom: 1px solid var(--border); }
  .search-bar input {
    width: 100%; max-width: 400px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Archivo Narrow', sans-serif;
    font-size: 13px; padding: 8px 12px; outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }

  .brands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px; background: var(--border);
    margin: 1rem 2rem 4rem;
    border: 1px solid var(--border);
  }
  .brand-card {
    background: var(--surface);
    padding: 1.5rem 1rem;
    cursor: pointer;
    text-decoration: none;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; text-align: center;
    transition: background 0.15s;
    animation: fadeUp 0.3s ease both;
  }
  .brand-card:hover { background: var(--surface2); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .brand-initial {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text);
    letter-spacing: 0.04em;
  }
  .brand-name { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.04em; }
  .brand-count { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .empty { grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }

  footer { border-top: 1px solid var(--border); padding: 2rem; }
  footer p { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }

  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(8,8,8,0.97); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border2);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    grid-template-columns: repeat(5, 1fr);
  }
  @media (max-width: 768px) { .mobile-nav { display: grid; } body { padding-bottom: 64px; } .nav-links { display: none; } }
  .mobile-nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'Archivo Narrow', sans-serif; font-size: 9px;
    letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
    padding: 4px 0; transition: color 0.2s;
  }
  .mobile-nav-btn:hover, .mobile-nav-btn.active { color: var(--text); }
  .mobile-nav-btn svg { width: 20px; height: 20px; }
  @media (max-width: 600px) { nav { padding: 0 1rem; } .brands-grid { margin: 1rem 1rem 3rem; } }
</style>
</head>

<script>
const products = [
  { id:1, brand:"Supreme", name:"Supreme Spider-Man SS26 T-Shirt", category:"tees", mainCat:"tops" },
  { id:2, brand:"Apple", name:"AirPods Max 2", category:"electronics", mainCat:"others" },
  { id:3, brand:"Lego", name:"One Piece Going Merry (Set 75639)", category:"lego", mainCat:"others" },
  { id:4, brand:"Artiemaster", name:"Artiemaster 370gsm Boxy Blank", category:"zippers", mainCat:"tops" },
  { id:5, brand:"Rimowa", name:"Rimowa Backpack", category:"bags", mainCat:"accessories" },
  { id:6, brand:"Louis Vuitton", name:"Louis Vuitton Wallets", category:"wallets", mainCat:"accessories" },
  { id:7, brand:"Stussy", name:"Stussy Thermal", category:"long sleeves", mainCat:"tops" },
  { id:8, brand:"Nike", name:"Nike Mind 002", category:"slippers", mainCat:"footwear" },
  { id:9, brand:"Lululemon", name:"Lululemon Yoga Woman", category:"tracksuits", mainCat:"bottoms" }
];

const brandColors = {
  'Supreme': '#e8272a', 'Apple': '#555', 'Lego': '#e3000b',
  'Nike': '#111', 'Louis Vuitton': '#8b6914', 'Stussy': '#111',
  'Rimowa': '#b0b0b0', 'Artiemaster': '#333', 'Lululemon': '#000'
};

function renderBrands() {
  const q = document.getElementById('brand-search').value.toLowerCase();
  const brandMap = {};
  products.forEach(p => {
    if (!brandMap[p.brand]) brandMap[p.brand] = 0;
    brandMap[p.brand]++;
  });
  const brands = Object.entries(brandMap)
    .filter(([b]) => b.toLowerCase().includes(q))
    .sort((a,b) => b[1] - a[1]);

  const grid = document.getElementById('brands-grid');
  if (!brands.length) { grid.innerHTML = '<div class="empty">No brands found</div>'; return; }
  grid.innerHTML = brands.map(([brand, count], i) => {
    const initials = brand.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const color = brandColors[brand] || '#444';
    return `<a href="index.html?brand=${encodeURIComponent(brand)}" class="brand-card" style="animation-delay:${i*0.04}s">
      <div class="brand-initial" style="border-color:${color};color:${color};">${initials}</div>
      <div class="brand-name">${brand}</div>
      <div class="brand-count">${count} find${count !== 1 ? 's' : ''}</div>
    </a>`;
  }).join('');
}

renderBrands();

document.getElementById('theme-toggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('light');
  this.textContent = document.documentElement.classList.contains('light') ? '🌑' : '🌙';
});
</script>
