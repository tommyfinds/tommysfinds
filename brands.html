<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brands – Tommy's Finds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080808;--surface:#0f0f0f;--surface2:#151515;--border:#1f1f1f;--border2:#2a2a2a;--text:#f0f0f0;--muted:#555;--nav-bg:rgba(8,8,8,0.92);--card-price:#fff;}
:root.light{--bg:#f5f5f3;--surface:#fff;--surface2:#f0f0ee;--border:#e0e0de;--border2:#d0d0ce;--text:#111;--muted:#888;--nav-bg:rgba(245,245,243,0.95);--card-price:#000;}
html{overflow-y:scroll;scrollbar-gutter:stable;}
body{font-family:'Archivo Narrow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;}
:root.light #bg-canvas{opacity:0.15;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:var(--text);text-decoration:none;}
.logo span{color:var(--muted);}
.nav-links{display:flex;gap:2rem;}
.nav-links a{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.theme-toggle{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:border-color 0.2s,color 0.2s;}
.theme-toggle:hover{border-color:var(--muted);color:var(--text);}
.hero{padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);}
.hero p{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,7vw,72px);letter-spacing:0.04em;line-height:0.9;color:var(--text);}
.search-wrap{padding:1rem 2rem;border-bottom:1px solid var(--border);}
.search-wrap input{width:100%;max-width:400px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Archivo Narrow',sans-serif;font-size:13px;padding:8px 12px;outline:none;}
.search-wrap input::placeholder{color:var(--muted);}
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin:1.5rem 2rem 4rem;}
.brand-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem 1rem 1.2rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:background 0.15s,border-color 0.15s,transform 0.15s;animation:fadeUp 0.3s ease both;}
.brand-card:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-2px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.brand-logo-circle{width:70px;height:70px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border2);flex-shrink:0;}
.brand-logo-circle img{width:50px;height:50px;object-fit:contain;}
.brand-initial-circle{width:70px;height:70px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--muted);letter-spacing:0.04em;}
.brand-name{font-size:13px;font-weight:500;color:var(--text);letter-spacing:0.02em;}
.brand-count{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
/* BRAND POPUP */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.82);align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.brand-modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:90%;max-width:680px;max-height:85vh;overflow-y:auto;position:relative;padding:1.5rem;}
.brand-modal-header{display:flex;align-items:center;gap:14px;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.brand-modal-logo{width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);overflow:hidden;flex-shrink:0;}
.brand-modal-logo img{width:36px;height:36px;object-fit:contain;}
.brand-modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.06em;color:var(--text);}
.brand-modal-sub{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
.modal-close{position:absolute;top:12px;right:12px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;}
.modal-close:hover{color:var(--text);}
.brand-items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.brand-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.brand-item:hover{border-color:var(--border2);}
.brand-item-img{width:100%;aspect-ratio:3/4;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.brand-item-img img{width:100%;height:100%;object-fit:contain;}
.brand-item-info{padding:8px 10px 10px;}
.brand-item-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:3px;}
.brand-item-price{font-size:11px;color:var(--muted);}
/* QV POPUP */
.qv-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.qv-overlay.open{display:flex;}
.qv-modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:90%;max-width:760px;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;position:relative;}
@media(max-width:600px){.qv-modal{grid-template-columns:1fr;}}
.qv-img-wrap{background:#fff;border-radius:12px 0 0 12px;overflow:hidden;min-height:300px;display:flex;align-items:center;justify-content:center;}
.qv-img-wrap img{width:100%;height:100%;object-fit:contain;}
.qv-info{padding:1.5rem;display:flex;flex-direction:column;gap:10px;}
.qv-close{position:absolute;top:12px;right:12px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.qv-brand-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.qv-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em;color:var(--text);line-height:1.1;}
.qv-price{font-size:20px;font-weight:600;color:var(--card-price);}
.color-tag{font-size:9px;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border2);color:var(--muted);background:var(--surface2);border-radius:3px;}
.color-tags{display:flex;gap:4px;flex-wrap:wrap;}
.qv-buy{display:block;padding:12px;text-align:center;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;font-family:'Archivo Narrow',sans-serif;color:var(--bg);background:var(--card-price);text-decoration:none;border:none;cursor:pointer;transition:opacity 0.15s;margin-top:auto;}
.qv-buy:hover{opacity:0.85;}
.empty{grid-column:1/-1;padding:4rem;text-align:center;color:var(--muted);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;}
footer{border-top:1px solid var(--border);padding:2rem;}
footer p{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:var(--text);}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,8,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border2);padding:8px 0 max(8px,env(safe-area-inset-bottom));grid-template-columns:repeat(5,1fr);}
@media(max-width:768px){.mobile-nav{display:grid;}body{padding-bottom:64px;}.nav-links{display:none;}nav{padding:0 1rem;}.brands-grid{margin:1rem 1rem 3rem;}}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Archivo Narrow',sans-serif;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;padding:4px 0;transition:color 0.2s;}
.mobile-nav-btn:hover,.mobile-nav-btn.active{color:var(--text);}
.mobile-nav-btn svg{width:20px;height:20px;}
</style>

<script>
const products = [
  {id:1,brand:"Supreme",name:"Supreme Spider-Man SS26 T-Shirt",price:7.93,colors:["Black","White"],image:"https://i.imgur.com/NVwXUaw.png",buyLink:"https://s.spblk.com/dae0",notes:"",videoLink:""},
  {id:2,brand:"Apple",name:"AirPods Max 2",price:37.24,colors:["Black","Blue","Orange","Purple","Gold"],image:"https://i.imgur.com/TOTUWH4.png",buyLink:"https://s.spblk.com/dhtg",notes:"",videoLink:""},
  {id:3,brand:"Lego",name:"One Piece Going Merry (Set 75639)",price:11.09,colors:["Brown","Beige","Red"],image:"https://i.imgur.com/amle350.png",buyLink:"https://s.spblk.com/deuo",notes:"",videoLink:""},
  {id:4,brand:"Artiemaster",name:"Artiemaster 370gsm Boxy Blank",price:13.47,colors:["Black","Dark Grey","Brown","Light Grey","Blue","Green"],image:"https://i.imgur.com/LliFjbe.png",buyLink:"https://s.spblk.com/digl",notes:"",videoLink:""},
  {id:5,brand:"Rimowa",name:"Rimowa Backpack",price:56.25,colors:["Black","Green"],image:"https://i.imgur.com/nGasrgN.jpeg",buyLink:"https://s.spblk.com/ccr3",notes:"",videoLink:""},
  {id:6,brand:"Louis Vuitton",name:"Louis Vuitton Wallets",price:6.33,colors:["Black","Brown"],image:"https://i.imgur.com/xOHpwIg.png",buyLink:"https://s.spblk.com/digo",notes:"",videoLink:""},
  {id:7,brand:"Stussy",name:"Stussy Thermal",price:17.43,colors:["Black","Green","White","Yellow","Blue","Light Grey","Dark Grey","Wine Red"],image:"https://i.imgur.com/yVS3xoo.png",buyLink:"https://s.spblk.com/digv",notes:"",videoLink:""},
  {id:8,brand:"Nike",name:"Nike Mind 002",price:19.81,colors:["Black","White","Pink","Beige","Light Grey"],image:"https://i.imgur.com/NtZfiNz.png",buyLink:"https://s.spblk.com/dh6v",notes:"",videoLink:""},
  {id:9,brand:"Lululemon",name:"Lululemon Yoga Woman",price:29.79,colors:["Black","White","Pink","Beige","Light Grey","Purple","Yellow","Green","Wine Red","Orange","Blue"],image:"https://i.imgur.com/ECNjKqe.png",buyLink:"https://s.spblk.com/dih5",notes:"",videoLink:""}
];

// Use Clearbit logo API for reliable brand logos
const brandDomains = {
  'Supreme': 'supremenewyork.com',
  'Apple': 'apple.com',
  'Lego': 'lego.com',
  'Rimowa': 'rimowa.com',
  'Louis Vuitton': 'louisvuitton.com',
  'Stussy': 'stussy.com',
  'Nike': 'nike.com',
  'Lululemon': 'lululemon.com',
  'Artiemaster': null
};

function getBrandLogoUrl(brand) {
  const domain = brandDomains[brand];
  if (!domain) return null;
  return `https://logo.clearbit.com/${domain}`;
}

function logoCircle(brand, size=70) {
  const url = getBrandLogoUrl(brand);
  const initials = brand.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  if (url) {
    return `<div class="brand-logo-circle" style="width:${size}px;height:${size}px;">
      <img src="${url}" onerror="this.parentElement.outerHTML='<div class=\\'brand-initial-circle\\' style=\\'width:${size}px;height:${size}px;\\'>${initials}</div>'" />
    </div>`;
  }
  return `<div class="brand-initial-circle" style="width:${size}px;height:${size}px;">${initials}</div>`;
}

function logoCircleSmall(brand) {
  const url = getBrandLogoUrl(brand);
  const initials = brand.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  if (url) return `<div class="brand-modal-logo"><img src="${url}" onerror="this.style.display='none'" /></div>`;
  return `<div class="brand-modal-logo"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);">${initials}</span></div>`;
}

function formatPrice(p) { return '$' + p.toFixed(2); }

function renderBrands() {
  const q = document.getElementById('brand-search').value.toLowerCase();
  const brandMap = {};
  products.forEach(p => { brandMap[p.brand] = (brandMap[p.brand]||0) + 1; });
  const brands = Object.entries(brandMap).filter(([b])=>b.toLowerCase().includes(q)).sort((a,b)=>b[1]-a[1]);
  const grid = document.getElementById('brands-grid');
  if (!brands.length) { grid.innerHTML='<div class="empty">No brands found</div>'; return; }
  grid.innerHTML = brands.map(([brand,count],i) => `
    <div class="brand-card" style="animation-delay:${i*0.05}s" onclick="openBrandModal('${brand.replace(/'/g,"\\'")}')"
      ${logoCircle(brand)}
      <div class="brand-name">${brand}</div>
      <div class="brand-count">${count} find${count!==1?'s':''}</div>
    </div>`).join('');
}

function openBrandModal(brand) {
  const items = products.filter(p => p.brand === brand);
  document.getElementById('bm-logo').innerHTML = logoCircleSmall(brand);
  document.getElementById('bm-title').textContent = brand;
  document.getElementById('bm-sub').textContent = items.length + ' find' + (items.length!==1?'s':'');
  document.getElementById('bm-items').innerHTML = items.map(p => `
    <div class="brand-item" onclick="openQV(${p.id})">
      <div class="brand-item-img"><img src="${p.image}" alt="${p.name}" /></div>
      <div class="brand-item-info">
        <div class="brand-item-name">${p.name}</div>
        <div class="brand-item-price">${formatPrice(p.price)}</div>
      </div>
    </div>`).join('');
  document.getElementById('brand-overlay').classList.add('open');
}

function openQV(id) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  document.getElementById('brand-overlay').classList.remove('open');
  document.getElementById('qv-img').innerHTML = `<img src="${p.image}" alt="${p.name}" />`;
  const related = products.filter(x=>x.id!==p.id && x.brand===p.brand).slice(0,2);
  document.getElementById('qv-info').innerHTML = `
    <div class="qv-brand-label">${p.brand}</div>
    <div class="qv-name">${p.name}</div>
    <div class="qv-price">${formatPrice(p.price)}</div>
    <div class="color-tags">${(p.colors||[]).map(c=>`<span class="color-tag">${c}</span>`).join('')}</div>
    ${p.notes?`<div style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;"><p style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Notes</p><p style="font-size:12px;color:var(--text);line-height:1.5;">${p.notes}</p></div>`:''}
    ${p.videoLink?`<a href="${p.videoLink}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;text-decoration:none;color:var(--text);font-size:12px;letter-spacing:0.06em;text-transform:uppercase;"><svg viewBox="0 0 24 24" fill="#ff4444" width="16" height="16"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>Watch my review</a>`:''}
    ${related.length?`<div style="border-top:1px solid var(--border);padding-top:12px;"><p style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">You might also like</p><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">${related.map(r=>`<div onclick="openQV(${r.id})" style="cursor:pointer;"><div style="width:100%;height:110px;background:#fff;border-radius:4px;overflow:hidden;"><img src="${r.image}" style="width:100%;height:100%;object-fit:contain;" /></div><p style="font-size:11px;color:var(--text);font-weight:500;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</p></div>`).join('')}</div></div>`:''}
    <a class="qv-buy" href="${p.buyLink}" target="_blank" rel="noopener">Buy on Superbuy →</a>
  `;
  document.getElementById('qv-overlay').classList.add('open');
}

document.getElementById('qv-overlay').addEventListener('click', e => { if(e.target===document.getElementById('qv-overlay')) document.getElementById('qv-overlay').classList.remove('open'); });
document.getElementById('brand-overlay').addEventListener('click', e => { if(e.target===document.getElementById('brand-overlay')) document.getElementById('brand-overlay').classList.remove('open'); });

renderBrands();

document.getElementById('theme-toggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('light');
  this.textContent = document.documentElement.classList.contains('light') ? '🌑' : '🌙';
});

// Animated background
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;
  function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function rnd(a,b){return a+Math.random()*(b-a);}
  function init(){const c=Math.floor((W*H)/22000);particles=Array.from({length:c},()=>({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.12,0.12),vy:rnd(-0.12,0.12),r:rnd(1,2.2),alpha:rnd(0.15,0.45)}));}
  function draw(){ctx.clearRect(0,0,W,H);for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(160,160,160,${p.alpha})`;ctx.fill();}const d=130;for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<d){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(140,140,140,${(1-dist/d)*0.12})`;ctx.lineWidth=0.6;ctx.stroke();}}requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();
</script>
